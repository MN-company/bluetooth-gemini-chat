name: Build Desktop Clients

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'desktop/**'
      - '.github/workflows/build-desktop.yml'
      - 'scripts/build_desktop_bundle.sh'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r desktop/requirements.txt pyinstaller

      - name: Build desktop app (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          python -m PyInstaller \
            --noconfirm \
            --clean \
            --windowed \
            --name BluetoothGeminiChat \
            --paths desktop \
            --collect-submodules bleak \
            --collect-submodules pystray \
            --add-data "desktop/install_macos_quick_action.py:." \
            --add-data "desktop/macos_quick_ask.sh:." \
            --add-data "desktop/macos_quick_ask.py:." \
            desktop/app.py

      - name: Build desktop app (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          python -m PyInstaller \
            --noconfirm \
            --clean \
            --windowed \
            --name BluetoothGeminiChat \
            --paths desktop \
            --collect-submodules bleak \
            --collect-submodules pystray \
            desktop/app.py

      - name: Package artifact (macOS DMG)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p dist/dmg-root
          cp -R dist/BluetoothGeminiChat.app dist/dmg-root/
          ln -s /Applications dist/dmg-root/Applications
          hdiutil create \
            -volname "BluetoothGeminiChat" \
            -srcfolder dist/dmg-root \
            -ov \
            -format UDZO \
            dist/BluetoothGeminiChat-macos.dmg

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/BluetoothGeminiChat/* -DestinationPath dist/BluetoothGeminiChat-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ runner.os }}
          path: |
            dist/BluetoothGeminiChat-macos.dmg
            dist/BluetoothGeminiChat-windows.zip
