name: Build Desktop Clients

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'desktop/**'
      - '.github/workflows/build-desktop.yml'
      - 'scripts/build_desktop_bundle.sh'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r desktop/requirements.txt pyinstaller

      - name: Build desktop app
        shell: bash
        run: |
          python -m PyInstaller \
            --noconfirm \
            --clean \
            --windowed \
            --name BluetoothGeminiChat \
            --paths desktop \
            --collect-submodules bleak \
            desktop/app.py

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd dist
          zip -r BluetoothGeminiChat-macos.zip BluetoothGeminiChat.app

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/BluetoothGeminiChat/* -DestinationPath dist/BluetoothGeminiChat-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ runner.os }}
          path: |
            dist/BluetoothGeminiChat-macos.zip
            dist/BluetoothGeminiChat-windows.zip
